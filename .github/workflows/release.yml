name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package source snapshot
        run: |
          archive="portfolio-${GITHUB_REF_NAME}.tar.gz"
          tar --exclude-vcs -czf "$archive" .
          echo "archive=$archive" >> "$GITHUB_ENV"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ env.archive }}

      - name: Trigger deploy workflow
        if: ${{ secrets.REPO_DISPATCH_TOKEN != '' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REPO_DISPATCH_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "deploy.yml",
              ref: "main",
              inputs: {
                release_tag: context.ref.replace("refs/tags/", ""),
                reason: "release-tag"
              }
            });
