name: Security

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run pip-audit
        run: |
          python -m pip install --upgrade pip pip-audit
          shopt -s nullglob
          files=(requirements*.txt)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No requirements*.txt files found. Skipping pip-audit."
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "Auditing $f"
            python -m pip_audit -r "$f"
          done

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run npm audit
        run: |
          if [ -f package.json ]; then
            npm audit --audit-level=high
          else
            echo "No package.json found. Skipping npm audit."
          fi

  codeql:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ["python", "javascript-typescript"]
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
