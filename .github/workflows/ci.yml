name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Python compile check
        run: python -m py_compile server.py

      - name: JS syntax check
        run: |
          node --check script.js
          node --check chatbot-upgrade.js

      - name: Static HTML sanity
        run: python scripts/static_sanity.py

      - name: API smoke tests
        run: python scripts/api_smoke_test.py --port 8123
