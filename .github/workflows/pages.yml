name: GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "styles.css"
      - "script.js"
      - "chatbot-upgrade.js"
      - "admin.html"
      - "assets/**"
      - "case-studies/**"
      - "reports/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build static artifact
        run: |
          set -euxo pipefail
          mkdir -p _site _site/portfolio

          for path in index.html styles.css script.js chatbot-upgrade.js admin.html case-studies assets reports CNAME robots.txt sitemap.xml; do
            if [ -e "$path" ]; then
              cp -R "$path" "_site/$path"
              cp -R "$path" "_site/portfolio/$path"
            fi
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4