title: Authentication Burst — Failed Logon Rate Spike
id: 1f8e6e2c-9c5e-4f7b-9c25-3a8e8f2a1c04
status: experimental
description: |
  Detects ≥10 failed authentication events from a single source IP within 60 seconds
  against a single target identity or service. Catches credential-stuffing replay and
  the brute-force phase of a password spray. Feeds the **signature** engine of the NIDS
  hybrid — deterministic, low-latency, intended to trigger fast and let downstream
  identity-aware filters (admin/service accounts excluded) drop the noise.
references:
  - https://attack.mitre.org/techniques/T1110/001/
  - https://attack.mitre.org/techniques/T1110/003/
author: Azhad Shahzad Shaik
date: 2026/05/24
tags:
  - attack.credential_access
  - attack.t1110.001
  - attack.t1110.003
  - engine.signature
logsource:
  product: linux
  service: auth
detection:
  selection_fail:
    EventName:
      - 'pam_unix(sshd:auth) authentication failure'
      - 'Failed password'
      - 'Invalid user'
  threshold:
    # Aggregated by source IP over 60s window; the backend rule engine emits an event
    # only when the count exceeds the threshold, so we test the annotated count field.
    failure_count_60s|gte: 10
  filter_known_pen_testers:
    src_ip|cidr:
      - '10.13.37.0/24'   # internal red-team range — adjust per environment
  condition: selection_fail and threshold and not filter_known_pen_testers
falsepositives:
  - Internal red-team / continuous validation runs (covered by filter)
  - Misconfigured monitoring agents that fail auth in tight loops
  - Vuln scanners (allowlist by source CIDR)
level: medium
fields:
  - src_ip
  - dest_user
  - dest_service
  - failure_count_60s
  - first_seen
  - last_seen
