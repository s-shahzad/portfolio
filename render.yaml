services:
  - type: web
    name: portfolio
    env: python
    plan: starter
    autoDeploy: true
    buildCommand: python -m pip install -r requirements.txt
    startCommand: python server.py --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: PORTFOLIO_ADMIN_REQUIRE_TOKEN
        value: "true"
      - key: PORTFOLIO_SMTP_PROVIDER
        value: "gmail"
      - key: PORTFOLIO_ENABLE_HSTS
        value: "true"
      - key: PORTFOLIO_STATIC_CACHE_MAX_AGE_SECONDS
        value: "604800"
      - key: PORTFOLIO_CONTACT_RATE_LIMIT_MAX_REQUESTS
        value: "5"
      - key: PORTFOLIO_CONTACT_RATE_LIMIT_WINDOW_SECONDS
        value: "300"
